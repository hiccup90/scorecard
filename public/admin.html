<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>积分管理 - 家长后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f23; --card: #1a1a2e; --border: #2a2a4a;
      --primary: #667eea; --accent: #764ba2;
      --text: #e0e0f0; --muted: #8888aa; --green: #4CAF50; --red: #FF5252;
    }
    [data-theme="light"] {
      --bg: #f5f5f8; --card: #ffffff; --border: #e0e0e8;
      --primary: #667eea; --accent: #764ba2;
      --text: #333344; --muted: #888899; --green: #4CAF50; --red: #FF5252;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 800px; margin: 0 auto; padding: 20px 16px 100px; }

    /* 顶部 */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 20px; }
    .topbar h1 { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar .user-badge { font-size: 13px; color: var(--muted); }
    .theme-btn { background: var(--card); border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; color: var(--text); transition: all 0.2s; }
    .theme-btn:hover { border-color: var(--primary); }

    /* 概览卡片 */
    .overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; }
    .stat-card .val { font-size: 32px; font-weight: 800; color: #FFD700; }
    .stat-card .lab { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Tab 切换 */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--card); border-radius: 12px; padding: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab-btn { flex: 1; min-width: fit-content; padding: 10px 8px; text-align: center; border: none; background: none; color: var(--muted); font-size: 14px; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .tab-btn.active { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 列表项 */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .section-title { font-size: 16px; font-weight: 700; }
    .btn { padding: 8px 16px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-red { background: var(--red); color: #fff; }
    .btn-orange { background: #FF9800; color: #fff; }
    .btn:hover { opacity: 0.85; }
    .btn-full { width: 100%; padding: 12px 16px; font-size: 14px; margin-bottom: 16px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
    .card-row { display: flex; align-items: center; gap: 12px; }
    .card-icon { font-size: 28px; flex-shrink: 0; }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 700; }
    .card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .card-action { display: flex; gap: 8px; flex-shrink: 0; }

    /* 表单 */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; color: var(--muted); }
    input, select, textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 14px; width: 100%; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }

    /* 弹窗 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; width: 100%; max-width: 420px; }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions .btn { flex: 1; }
    .btn-cancel { background: var(--border); color: var(--text); }

    /* 奖励项 */
    .reward-card { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
    .reward-card .r-icon { font-size: 32px; }
    .reward-card .r-body { flex: 1; }
    .reward-card .r-name { font-size: 15px; font-weight: 700; }
    .reward-card .r-cost { font-size: 13px; color: #FFD700; margin-top: 2px; }
    .reward-card .r-actions { display: flex; gap: 6px; }

    /* 空状态 */
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    /* 分类标签 */
    .cat-badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; margin-left: 6px;
      background: rgba(102,126,234,0.2); color: #667eea;
    }
    .streak-badge {
      display: inline-block; padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; margin-left: 4px;
      background: rgba(255,87,34,0.2); color: #FF5722;
    }

    /* 审核区域标题 */
    .review-section-title {
      font-size: 16px; font-weight: 700; margin-bottom: 12px; margin-top: 4px;
    }
    .review-section-title:not(:first-child) { margin-top: 28px; }
    .cat-section { margin-bottom: 20px; }
    .cat-section-header { font-size: 14px; font-weight: 700; color: var(--primary); margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }

    /* 驳回原因 */
    .reject-reason {
      font-size: 11px; color: var(--red); margin-top: 2px;
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .wrap { padding: 12px 10px 80px; }
      .overview { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-card { padding: 12px 8px; border-radius: 12px; }
      .stat-card .val { font-size: 24px; }
      .stat-card .lab { font-size: 11px; }
      .card { padding: 12px; }
      .card-row { gap: 8px; }
      .card-icon { font-size: 24px; }
      .card-title { font-size: 14px; }
      .card-action { gap: 4px; }
      .card-action .btn { padding: 6px 10px; font-size: 11px; }
      .form-grid { grid-template-columns: 1fr; }
      .modal-overlay.show { padding: 0; align-items: flex-end; }
      .modal { max-width: 100%; border-radius: 20px 20px 0 0; padding: 20px 16px 32px; }
      .tabs { gap: 2px; padding: 3px; }
      .tab-btn { font-size: 12px; padding: 8px 10px; }
      .section-header { gap: 6px; }
      .reward-card { padding: 12px; gap: 8px; }
      .reward-card .r-icon { font-size: 26px; }
      .reward-card .r-name { font-size: 14px; }
      .btn-full { padding: 10px 14px; font-size: 13px; }
    }

    /* 登录遮罩 */
    .login-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    .login-overlay.hidden { display: none; }
    .login-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 32px 28px; width: 100%; max-width: 340px; text-align: center;
    }
    .login-box h2 { font-size: 20px; margin-bottom: 8px; }
    .login-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .login-box input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); padding: 12px 16px; font-size: 24px; text-align: center;
      letter-spacing: 12px; width: 100%; margin-bottom: 16px;
    }
    .login-box input:focus { outline: none; border-color: var(--primary); }
    .login-error { color: var(--red); font-size: 13px; margin-bottom: 12px; min-height: 20px; }
  /* icon picker */
.icon-opt { width:36px; height:36px; font-size:20px; display:flex; align-items:center; justify-content:center; border:2px solid transparent; border-radius:8px; cursor:pointer; transition:all .15s; background:var(--input-bg); }
.icon-opt:hover { border-color:var(--primary); transform:scale(1.15); }
.icon-opt.active { border-color:var(--primary); background:rgba(102,126,234,.15); }
</style>
</head>
<body>
  <!-- PIN 登录 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>🔐 家长验证</h2>
      <p>请输入管理 PIN 码</p>
      <input type="password" id="pinInput" inputmode="numeric" maxlength="8" placeholder="····" autofocus>
      <div class="login-error" id="loginError"></div>
      <button class="btn btn-primary" style="width:100%;padding:12px;" onclick="doLogin()">进入管理</button>
    </div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <h1>🛡️ 家长管理</h1>
      <div class="topbar-right">
        <button class="theme-btn" id="themeToggle" title="切换亮/暗模式">🌓</button>
        <span class="user-badge">管理员</span>
      </div>
    </div>

    <!-- 概览 -->
    <div class="overview">
      <div class="stat-card">
        <div class="val" id="statBalance">-</div>
        <div class="lab">当前积分</div>
      </div>
      <div class="stat-card">
        <div class="val" id="statToday">-</div>
        <div class="lab">今日获得</div>
      </div>
      <div class="stat-card">
        <div class="val" id="statPendingClock">-</div>
        <div class="lab">待审批</div>
      </div>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-review">审核</button>
      <button class="tab-btn" data-tab="tab-rewards">奖励</button>
      <button class="tab-btn" data-tab="tab-items">打卡项</button>
      <button class="tab-btn" data-tab="tab-log">积分记录</button>
      <button class="tab-btn" data-tab="tab-adjust">调分</button>
    </div>

    <!-- 积分记录 -->
    <div class="tab-content active" id="tab-log">
      <div class="section-header">
        <span class="section-title">📋 积分流水</span>
        <select id="filterUser" onchange="loadLogs()" style="width:auto;font-size:13px;padding:6px 10px;">
          <option value="1">全部孩子</option>
        </select>
      </div>
      <div id="logsList"></div>
    </div>

    <!-- 打卡项配置 -->
    <div class="tab-content" id="tab-items">
      <div class="section-header">
        <span class="section-title">⭐ 打卡项目配置</span>
        <button class="btn btn-primary" onclick="openItemModal()">+ 新增</button>
      </div>
      <div id="itemsList"></div>
    </div>

    <!-- 奖励配置 -->
    <div class="tab-content" id="tab-rewards">
      <div class="section-header">
        <span class="section-title">🎁 奖励配置</span>
        <button class="btn btn-primary" onclick="openRewardModal()">+ 新增</button>
      </div>
      <div id="rewardsList"></div>
    </div>

    <!-- 审核 -->
    <div class="tab-content" id="tab-review">
      <!-- 打卡审核区 -->
      <div class="review-section-title">📝 打卡审核</div>
      <div id="clockReviewList"></div>

      <!-- 兑换审批区 -->
      <div class="review-section-title">📥 兑换审批</div>
      <div id="pendingRedemptions"></div>
    </div>

    <!-- 手工调分 -->
    <div class="tab-content" id="tab-adjust">
      <div class="section-header">
        <span class="section-title">⚖️ 手工调整积分</span>
      </div>
      <div class="card">
        <div class="form-grid">
          <div class="form-group">
            <label>选择孩子</label>
            <select id="adjUser"><option value="1">孩子</option></select>
          </div>
          <div class="form-group">
            <label>调整分值（负数即扣分）</label>
            <input type="number" id="adjChange" placeholder="如 5 或 -10">
          </div>
          <div class="form-group full">
            <label>原因说明</label>
            <input type="text" id="adjReason" placeholder="如：今天很棒！/ 扣分原因">
          </div>
        </div>
        <button class="btn btn-green" onclick="doAdjust()" style="margin-top:8px;width:100%;">确认调整</button>
      </div>
    </div>
  </div>

  <!-- 新增/编辑打卡项弹窗 -->
  <div class="modal-overlay" id="itemModal">
    <div class="modal">
      <h2 id="itemModalTitle">新增打卡项</h2>
      <input type="hidden" id="itemId">
      <div class="form-grid">
        <div class="form-group full">
          <label>名称</label>
          <input type="text" id="itemLabel" placeholder="如：写作业">
        </div>
        <div class="form-group">
          <label>基础分</label>
          <input type="number" id="itemPoints" placeholder="1">
        </div>
        <div class="form-group">
          <label>类型</label>
          <select id="itemScoreMode">
            <option value="default">默认</option>
            <option value="quality">质量</option>
            <option value="duration">时长</option>
          </select>
        </div>
        <div class="form-group full">
          <label>图标</label>
          <div id="iconPicker" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;"></div>
          <input type="hidden" id="itemIcon">
        </div>
        <div class="form-group full">
          <label>分类</label>
          <select id="itemCategory">
            <option value="语文">语文</option>
            <option value="数学">数学</option>
            <option value="英语">英语</option>
            <option value="科学">科学</option>
            <option value="生活">生活</option>
            <option value="才艺">才艺</option>
          </select>
        </div>
        <div class="form-group full">
          <label>规则说明</label>
          <input type="text" id="itemRuleHint" value="默认：基础分；质量：及格/良好/优秀=×1/×2/×3；时长：10分钟=1单位" disabled>
        </div>
        
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeItemModal()">取消</button>
        <button class="btn btn-primary" onclick="saveItem()">保存</button>
      </div>
    </div>
  </div>

  <!-- 新增/编辑奖励弹窗 -->
  <div class="modal-overlay" id="rewardModal">
    <div class="modal">
      <h2 id="rewardModalTitle">新增奖励</h2>
      <input type="hidden" id="rewardId">
      <div class="form-grid">
        <div class="form-group full">
          <label>奖励名称</label>
          <input type="text" id="rewardName" placeholder="如：去游乐园">
        </div>
        <div class="form-group">
          <label>所需积分</label>
          <input type="number" id="rewardCost" placeholder="100">
        </div>
        <div class="form-group">
          <label>库存（-1 无限）</label>
          <input type="number" id="rewardStock" value="-1">
        </div>
        <div class="form-group full">
          <label>描述</label>
          <input type="text" id="rewardDesc" placeholder="可选描述">
        </div>
        <div class="form-group full">
          <label>自动通过审批</label>
          <select id="rewardAutoApprove">
            <option value="1">是（立即扣积分）</option>
            <option value="0">否（需手动审批）</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeRewardModal()">取消</button>
        <button class="btn btn-primary" onclick="saveReward()">保存</button>
      </div>
    </div>
  </div>

<script>
const API = '';
const USER_ID = 1;
const PARENT_ID = 2;

// ── 主题切换 ──
(function initTheme() {
  const saved = localStorage.getItem('scorecard-theme');
  if (saved) {
    document.body.setAttribute('data-theme', saved);
  }
  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme');
    const next = (current === 'light') ? null : 'light';
    if (next) {
      document.body.setAttribute('data-theme', next);
    } else {
      document.body.removeAttribute('data-theme');
    }
    localStorage.setItem('scorecard-theme', next || 'dark');
  });
})();

// ── API（带认证） ──
let authToken = sessionStorage.getItem('scorecard-token') || '';

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(authToken ? { 'x-auth-token': authToken } : {}),
    },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (res.status === 401) {
    authToken = '';
    sessionStorage.removeItem('scorecard-token');
    showLogin();
    throw new Error('需要登录');
  }
  return res.json();
}

// ── 登录 ──
function showLogin() {
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('pinInput').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('pinInput').focus();
}

async function doLogin() {
  const pin = document.getElementById('pinInput').value.trim();
  if (!pin) return;
  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const data = await res.json();
    if (data.ok && data.token) {
      authToken = data.token;
      sessionStorage.setItem('scorecard-token', authToken);
      document.getElementById('loginOverlay').classList.add('hidden');
      loadOverview(); loadLogs(); loadItems(); loadRewards();
    } else {
      document.getElementById('loginError').textContent = data.error || 'PIN 码错误';
    }
  } catch (e) {
    document.getElementById('loginError').textContent = '网络错误';
  }
}

// PIN 输入框回车提交
document.getElementById('pinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── 启动：先验证 token ──
(async function init() {
  if (!authToken) { showLogin(); return; }
  try {
    const res = await fetch(API + '/api/auth/verify', {
      headers: { 'x-auth-token': authToken },
    });
    if (!res.ok) { showLogin(); return; }
  } catch { showLogin(); return; }
  loadOverview(); loadLogs(); loadItems(); loadRewards();
})();

// ── Tab 切换 ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    // 切换到审核 tab 时刷新数据
    if (btn.dataset.tab === 'tab-review') loadReviewTab();
  });
});

// ── 概览 ──
async function loadOverview() {
  const stats = await api('/api/stats/1');
  document.getElementById('statBalance').textContent = stats.balance ?? 0;
  document.getElementById('statToday').textContent = '+' + (stats.today_total ?? 0);
  const pendingClock = stats.pending_clock ?? 0;
  const statEl = document.getElementById('statPendingClock');
  statEl.textContent = pendingClock;
  statEl.style.color = pendingClock > 0 ? '#FF5252' : '';
}

// ── 积分记录 ──
async function loadLogs() {
  const logs = await api('/api/logs/1');
  const list = document.getElementById('logsList');
  if (!logs.length) {
    list.innerHTML = '<div class="empty"><div class="icon">📋</div><div>暂无记录</div></div>';
    return;
  }
  list.innerHTML = logs.map(log => {
    const time = new Date(log.created_at + 'Z').toLocaleString('zh-CN');
    return `
      <div class="card">
        <div class="card-row">
          <div class="card-icon">${log.icon || '⭐'}</div>
          <div class="card-body">
            <div class="card-title">${log.item_label || log.reason || '积分变动'}</div>
            <div class="card-meta">${time}</div>
          </div>
          <div style="font-size:18px;font-weight:800;color:${log.change > 0 ? '#4CAF50' : '#FF5252'}">
            ${log.change > 0 ? '+' : ''}${log.change}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ── 打卡项（带分类） ──
async function loadItems() {
  const items = await api('/api/point-items');
  const list = document.getElementById('itemsList');
  if (!items.length) {
    list.innerHTML = '<div class="empty"><div class="icon">⭐</div><div>还没有打卡项</div></div>';
    return;
  }
  // 按分类分组
  const groups = {};
  items.forEach(item => {
    const cat = item.category || '生活';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  });
  const catOrder = ['语文','数学','英语','科学','生活','才艺'];
  const sortedCats = catOrder.filter(c => groups[c]);
  Object.keys(groups).forEach(c => { if (!sortedCats.includes(c)) sortedCats.push(c); });

  list.innerHTML = sortedCats.map(cat => `
    <div class="cat-section">
      <div class="cat-section-header">${cat}</div>
      ${groups[cat].map(item => {
        const modeText = item.score_mode === 'quality'
          ? '质量'
          : item.score_mode === 'duration'
            ? '时长'
            : '默认';
        return `
        <div class="card">
          <div class="card-row">
            <div class="card-icon">${item.icon || '⭐'}</div>
            <div class="card-body">
              <div class="card-title">${item.label}</div>
              <div class="card-meta">基础分 ${item.points} · ${modeText} · ${item.enabled ? '启用' : '禁用'}</div>
            </div>
            <div class="card-action" style="flex-wrap:wrap;gap:4px;">
              <button class="btn" style="background:var(--border);font-size:11px;padding:4px 8px;" onclick="moveItem(${item.id},'up')">↑</button>
              <button class="btn" style="background:var(--border);font-size:11px;padding:4px 8px;" onclick="moveItem(${item.id},'down')">↓</button>
              <button class="btn" style="background:var(--border);font-size:12px;" onclick="editItem(${item.id}, '${item.label.replace(/'/g, "\\'")}', ${item.points}, '${item.score_mode || 'default'}', '${item.icon}', '${item.color}', '${item.category || '生活'}')">编辑</button>
              <button class="btn btn-red" style="font-size:12px;" onclick="deleteItem(${item.id})">删除</button>
            </div>
          </div>
        </div>
      `;}).join('')}
    </div>
  `).join('');
}

const ICONS = ['📚','📖','✏️','🖊️','📝','🧮','🔢','🅰️','🔤','🧪','🔬','🔭','🌍','🗺️','🎵','🎹','🎸','🎨','🖌️','💃','⚽','🏀','🏃','🏊','🧘','🍳','🧹','🧺','🌱','💧','🍎','🥛','😴','⏰','💡','🧩','🎯','⭐','✨','🏆','🎁','❤️','👍','💪'];

function initIconPicker(selected) {
  const el = document.getElementById('iconPicker');
  el.innerHTML = ICONS.map(ic =>
    `<div class="icon-opt${ic===selected?' active':''}" data-ic="${ic}" onclick="pickIcon(this,'${ic}')">${ic}</div>`
  ).join('');
}

function pickIcon(el, ic) {
  document.querySelectorAll('#iconPicker .icon-opt').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('itemIcon').value = ic;
}

function openItemModal() {
  document.getElementById('itemId').value = '';
  document.getElementById('itemLabel').value = '';
  document.getElementById('itemPoints').value = '';
  document.getElementById('itemScoreMode').value = 'default';
  document.getElementById('itemIcon').value = '✨';
  document.getElementById('itemCategory').value = '生活';
  document.getElementById('itemModalTitle').textContent = '新增打卡项';
  initIconPicker('✨');
  document.getElementById('itemModal').classList.add('show');
}

function editItem(id, label, points, scoreMode, icon, color, category) {
  document.getElementById('itemId').value = id;
  document.getElementById('itemLabel').value = label;
  document.getElementById('itemPoints').value = points;
  document.getElementById('itemScoreMode').value = scoreMode || 'default';
  document.getElementById('itemIcon').value = icon;
  document.getElementById('itemCategory').value = category || '生活';
  document.getElementById('itemModalTitle').textContent = '编辑打卡项';
  initIconPicker(icon);
  document.getElementById('itemModal').classList.add('show');
}

function closeItemModal() {
  document.getElementById('itemModal').classList.remove('show');
}

async function saveItem() {
  const id = document.getElementById('itemId').value;
  const body = {
    label: document.getElementById('itemLabel').value,
    points: parseInt(document.getElementById('itemPoints').value),
    score_mode: document.getElementById('itemScoreMode').value,
    icon: document.getElementById('itemIcon').value || '✨',
    color: '#6C63FF',
    category: document.getElementById('itemCategory').value,
    enabled: true,
    sort_order: 0,
  };
  if (id) {
    await api(`/api/point-items/${id}`, { method: 'PUT', body });
  } else {
    await api('/api/point-items', { method: 'POST', body });
  }
  closeItemModal();
  loadItems();
}

async function deleteItem(id) {
  if (!confirm('确定删除？')) return;
  await api(`/api/point-items/${id}`, { method: 'DELETE' });
  loadItems();
}

async function moveItem(id, direction) {
  await api(`/api/point-items/${id}/move`, { method: 'POST', body: { direction } });
  loadItems();
}

// ── 奖励 ──
async function loadRewards() {
  const rewards = await api('/api/rewards');
  const list = document.getElementById('rewardsList');
  if (!rewards.length) {
    list.innerHTML = '<div class="empty"><div class="icon">🎁</div><div>还没有奖励</div></div>';
    return;
  }
  list.innerHTML = rewards.map(r => `
    <div class="reward-card">
      <div class="r-icon">🎁</div>
      <div class="r-body">
        <div class="r-name">${r.name}</div>
        <div class="r-cost">${r.cost} 分 · ${r.auto_approve ? '自动通过' : '需审批'} · 库存 ${r.stock < 0 ? '∞' : r.stock}</div>
      </div>
      <div class="r-actions">
        <button class="btn" style="background:var(--border);font-size:12px;" onclick="editReward(${r.id}, '${r.name.replace(/'/g, "\\'")}', ${r.cost}, '${(r.description || '').replace(/'/g, "\\'")}', ${r.stock}, ${r.auto_approve})">编辑</button>
        <button class="btn btn-red" style="font-size:12px;" onclick="deleteReward(${r.id})">删除</button>
      </div>
    </div>
  `).join('');
}

function openRewardModal() {
  document.getElementById('rewardId').value = '';
  document.getElementById('rewardName').value = '';
  document.getElementById('rewardCost').value = '';
  document.getElementById('rewardDesc').value = '';
  document.getElementById('rewardStock').value = '-1';
  document.getElementById('rewardAutoApprove').value = '1';
  document.getElementById('rewardModalTitle').textContent = '新增奖励';
  document.getElementById('rewardModal').classList.add('show');
}

function editReward(id, name, cost, desc, stock, autoApprove) {
  document.getElementById('rewardId').value = id;
  document.getElementById('rewardName').value = name;
  document.getElementById('rewardCost').value = cost;
  document.getElementById('rewardDesc').value = desc;
  document.getElementById('rewardStock').value = stock;
  document.getElementById('rewardAutoApprove').value = autoApprove ? '1' : '0';
  document.getElementById('rewardModalTitle').textContent = '编辑奖励';
  document.getElementById('rewardModal').classList.add('show');
}

function closeRewardModal() {
  document.getElementById('rewardModal').classList.remove('show');
}

async function saveReward() {
  const id = document.getElementById('rewardId').value;
  const body = {
    name: document.getElementById('rewardName').value,
    cost: parseInt(document.getElementById('rewardCost').value),
    description: document.getElementById('rewardDesc').value,
    stock: parseInt(document.getElementById('rewardStock').value),
    auto_approve: document.getElementById('rewardAutoApprove').value === '1',
    enabled: true,
  };
  if (id) {
    await api(`/api/rewards/${id}`, { method: 'PUT', body });
  } else {
    await api('/api/rewards', { method: 'POST', body });
  }
  closeRewardModal();
  loadRewards();
}

async function deleteReward(id) {
  if (!confirm('确定删除？')) return;
  await api(`/api/rewards/${id}`, { method: 'DELETE' });
  loadRewards();
}

// ── 手工调分 ──
async function doAdjust() {
  const user_id = parseInt(document.getElementById('adjUser').value);
  const change = parseInt(document.getElementById('adjChange').value);
  const reason = document.getElementById('adjReason').value;
  if (!change) { alert('请输入分值'); return; }
  await api('/api/adjust', { method: 'POST', body: { user_id, change, reason, parent_id: PARENT_ID } });
  document.getElementById('adjChange').value = '';
  document.getElementById('adjReason').value = '';
  loadOverview();
  loadLogs();
}

// ── 审核 Tab（合并打卡审核 + 兑换审批） ──
async function loadReviewTab() {
  await Promise.all([
    loadClockReview(),
    loadPendingRedemptions(),
  ]);
}

// ── 打卡审核（按状态分组：pending / confirmed / reversed） ──
async function loadClockReview() {
  const rows = await api('/api/clock-requests');
  const list = document.getElementById('clockReviewList');

  if (!rows.length) {
    list.innerHTML = '<div class="empty"><div class="icon">✅</div><div>暂无打卡记录</div></div>';
    return;
  }

  rows.sort((a, b) => {
    const statusOrder = { pending: 0, confirmed: 1, reversed: 2 };
    if (statusOrder[a.status] !== statusOrder[b.status]) return statusOrder[a.status] - statusOrder[b.status];
    return new Date(b.created_at + 'Z') - new Date(a.created_at + 'Z');
  });

  list.innerHTML = rows.map(r => {
    const time = new Date(r.created_at + 'Z').toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    const dateStr = new Date(r.created_at + 'Z').toLocaleDateString('zh-CN');
    const streakInfo = r.streak_bonus > 0
      ? `<span class="streak-badge">🔥连续+${r.streak_bonus}</span>`
      : '';

    if (r.status === 'pending') {
      const mode = r.score_mode || 'default';
      const qualityActions = `
        <button class="btn btn-green" style="font-size:12px;" onclick="approveClock(${r.id}, 'pass')">及格</button>
        <button class="btn" style="background:#3B82F6;color:#fff;font-size:12px;" onclick="approveClock(${r.id}, 'good')">良好</button>
        <button class="btn" style="background:#8B5CF6;color:#fff;font-size:12px;" onclick="approveClock(${r.id}, 'excellent')">优秀</button>
      `;
      const defaultActions = `
        <button class="btn btn-green" style="font-size:12px;" onclick="approveClock(${r.id})">按基础分通过</button>
      `;
      const durationActions = `
        <input type="number" id="minutes-${r.id}" placeholder="分钟" style="width:84px;">
        <button class="btn btn-green" style="font-size:12px;" onclick="approveDurationClock(${r.id})">按时长通过</button>
      `;
      const actionHtml = mode === 'quality' ? qualityActions : mode === 'duration' ? durationActions : defaultActions;
      const hintText = mode === 'quality'
        ? `基础分 ${r.base_points} · 及格/良好/优秀 = ×1/×2/×3`
        : mode === 'duration'
          ? `基础分 ${r.base_points} · 10分钟=1单位`
          : `基础分 ${r.base_points}`;
      return `
        <div class="card" style="border-left: 3px solid #FF9800;">
          <div class="card-row" style="align-items:flex-start;">
            <div class="card-icon">${r.icon || '⭐'}</div>
            <div class="card-body">
              <div class="card-title">${r.user_name || '孩子'} 打卡「${r.item_label}」${streakInfo} <span style="color:#FF9800;font-size:12px;">⏳待审核</span></div>
              <div class="card-meta">${hintText} · ${dateStr} ${time}</div>
              <div class="card-action" style="margin-top:8px;flex-wrap:wrap;">
                ${actionHtml}
                <button class="btn btn-red" style="font-size:12px;" onclick="rejectClock(${r.id})">驳回</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    if (r.status === 'confirmed') {
      const detailText = r.review_minutes
        ? `${r.review_minutes}分钟`
        : r.review_level === 'excellent'
          ? '优秀'
          : r.review_level === 'good'
            ? '良好'
            : r.review_level === 'pass'
              ? '及格'
              : '默认';
      return `
        <div class="card">
          <div class="card-row">
            <div class="card-icon">${r.icon || '⭐'}</div>
            <div class="card-body">
              <div class="card-title">${r.user_name || '孩子'} 打卡「${r.item_label}」${streakInfo} <span style="color:#4CAF50;font-size:12px;">✓已通过</span></div>
              <div class="card-meta">+${r.points_at_time} 分 · ${detailText} · ${dateStr} ${time}</div>
            </div>
            <div class="card-action">
              <button class="btn btn-orange" style="font-size:12px;" onclick="reverseClockRequest(${r.id})">撤回</button>
            </div>
          </div>
        </div>
      `;
    }

    const reasonHtml = r.reverse_reason
      ? `<div class="reject-reason">驳回原因：${r.reverse_reason}</div>`
      : '';
    return `
      <div class="card" style="opacity:0.5;">
        <div class="card-row">
          <div class="card-icon">${r.icon || '⭐'}</div>
          <div class="card-body">
            <div class="card-title">${r.user_name || '孩子'} 打卡「${r.item_label}」${streakInfo} <span style="color:#FF5252;font-size:12px;">❌已撤回</span></div>
            <div class="card-meta">${dateStr} ${time}</div>
            ${reasonHtml}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function approveClock(id, reviewLevel = null) {
  const body = { parent_id: PARENT_ID };
  if (reviewLevel) body.review_level = reviewLevel;
  await api(`/api/clock-requests/${id}/approve`, {
    method: 'POST',
    body
  });
  loadReviewTab();
  loadOverview();
  loadLogs();
}

async function approveDurationClock(id) {
  const minutes = parseInt(document.getElementById(`minutes-${id}`)?.value, 10);
  if (!minutes || minutes < 10) {
    alert('请输入至少 10 分钟');
    return;
  }
  await api(`/api/clock-requests/${id}/approve`, {
    method: 'POST',
    body: { parent_id: PARENT_ID, review_minutes: minutes }
  });
  loadReviewTab();
  loadOverview();
  loadLogs();
}

async function rejectClock(id) {
  const reason = prompt('驳回原因（可选）：');
  if (reason === null) return;
  await api(`/api/clock-requests/${id}/reject`, {
    method: 'POST',
    body: { parent_id: PARENT_ID, reason: reason || '家长驳回' }
  });
  loadReviewTab();
  loadOverview();
  loadLogs();
}

async function reverseClockRequest(id) {
  const reason = prompt('撤回原因（可选）：');
  if (reason === null) return;
  await api(`/api/clock-requests/${id}/reverse`, {
    method: 'POST',
    body: { parent_id: PARENT_ID, reason: reason || '家长撤回' }
  });
  loadReviewTab();
  loadOverview();
  loadLogs();
}

// ── 待审批兑换 ──
async function loadPendingRedemptions() {
  const rows = await api('/api/redemptions');
  const pending = rows.filter(r => r.status === 'pending');
  const list = document.getElementById('pendingRedemptions');
  if (!pending.length) {
    list.innerHTML = '<div class="empty"><div class="icon">✅</div><div>暂无待审批兑换</div></div>';
    return;
  }
  list.innerHTML = pending.map(r => {
    const time = new Date(r.created_at + 'Z').toLocaleString('zh-CN');
    return `
      <div class="card">
        <div class="card-row">
          <div class="card-icon">🎁</div>
          <div class="card-body">
            <div class="card-title">${r.user_name} 兑换「${r.reward_name}」</div>
            <div class="card-meta">${r.cost_at_time} 分 · ${time}</div>
          </div>
          <div class="card-action">
            <button class="btn btn-green" onclick="approveRedemption(${r.id})">通过</button>
            <button class="btn btn-red" onclick="rejectRedemption(${r.id})">驳回</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function approveRedemption(id) {
  if (!confirm('确认通过？积分将立即扣除。')) return;
  await api(`/api/redemptions/${id}/approve`, { method: 'POST', body: { parent_id: PARENT_ID } });
  loadPendingRedemptions();
  loadOverview();
}

async function rejectRedemption(id) {
  if (!confirm('确认驳回？')) return;
  await api(`/api/redemptions/${id}/reject`, { method: 'POST' });
  loadPendingRedemptions();
}

// ── 自动刷新 ──
setInterval(loadOverview, 30000);
</script>
