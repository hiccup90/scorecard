services:
  api:
    image: ghcr.io/hiccup90/scorecard:latest
    build: .
    ports:
      - "3003:3003"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3003
      - ADMIN_PIN=${ADMIN_PIN:-1234}
      - CHILD_PIN=${CHILD_PIN:-${ADMIN_PIN:-1234}}
      - DB_PATH=/app/data/scorecard.db
      - STATIC_DIR=/app/web/dist
    restart: unless-stopped
